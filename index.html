<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>闪念笔记</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .note-card {
            transition: all 0.2s ease;
        }
        .note-card:active {
            transform: scale(0.98);
        }
        .bottom-nav {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item.active {
            color: #4F46E5;
        }
        .fab-button {
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4F46E5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-900">🧠 闪念笔记</h1>
            <button onclick="showSettings()" class="text-gray-600 p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-lg mx-auto px-4 py-4 pb-24" id="main-content">
        <!-- 搜索框 -->
        <div class="mb-4">
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="🔍 搜索笔记..." 
                    class="w-full px-4 py-3 pl-10 bg-white rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    oninput="searchNotes(this.value)"
                >
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="mb-4 flex gap-2 overflow-x-auto">
            <span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm whitespace-nowrap" id="total-notes">
                📝 0 篇笔记
            </span>
            <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm whitespace-nowrap" id="total-tags">
                🏷️ 0 个标签
            </span>
        </div>

        <!-- 笔记列表 -->
        <div id="notes-list" class="space-y-3">
            <!-- 笔记卡片会通过 JavaScript 动态插入 -->
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">📝</div>
            <h3 class="text-lg font-medium text-gray-900 mb-2">还没有笔记</h3>
            <p class="text-gray-500">点击下方按钮创建第一篇笔记</p>
        </div>
    </main>

    <!-- 添加笔记页面 -->
    <div id="add-note-page" class="fixed inset-0 bg-white z-50 hidden">
        <div class="max-w-lg mx-auto h-full flex flex-col">
            <header class="px-4 py-3 border-b flex items-center justify-between">
                <button onclick="closeAddPage()" class="text-gray-600 flex items-center gap-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    取消
                </button>
                <h2 class="text-lg font-semibold">新建笔记</h2>
                <button onclick="saveNote()" class="text-indigo-600 font-medium">保存</button>
            </header>
            
            <div class="flex-1 p-4 overflow-y-auto">
                <input 
                    type="text" 
                    id="note-title"
                    placeholder="标题" 
                    class="w-full text-xl font-medium border-none focus:outline-none mb-4"
                >
                <textarea 
                    id="note-content"
                    placeholder="记录你的想法..." 
                    class="w-full flex-1 min-h-[300px] border-none focus:outline-none resize-none text-gray-700"
                ></textarea>
            </div>

            <div class="p-4 border-t space-y-3">
                <!-- 豆瓣导入 -->
                <div class="border-t pt-3">
                    <p class="text-sm text-gray-500 mb-2">📚 快速导入</p>
                    <input 
                        type="text" 
                        id="douban-url"
                        placeholder="豆瓣链接或 ID（可选）" 
                        class="w-full px-3 py-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm mb-2"
                    >
                    <div class="flex gap-2 mb-2">
                        <button onclick="setDoubanType('book')" id="type-book" class="flex-1 bg-pink-100 text-pink-700 py-1.5 rounded-lg text-sm font-medium border-2 border-pink-300">
                            📚 书籍
                        </button>
                        <button onclick="setDoubanType('movie')" id="type-movie" class="flex-1 bg-blue-100 text-blue-700 py-1.5 rounded-lg text-sm font-medium border-2 border-transparent">
                            🎬 电影
                        </button>
                    </div>
                    <button onclick="importFromDouban()" id="douban-import-btn" class="w-full bg-green-500 text-white py-2.5 rounded-xl font-medium flex items-center justify-center gap-2">
                        <span>✨</span>
                        <span>快速创建笔记</span>
                    </button>
                    <p class="text-xs text-gray-400 mt-2">💡 提示：可直接输入数字 ID，或手动填写信息</p>
                </div>

                <!-- AI 整理按钮 -->
                <button onclick="analyzeWithAI()" id="ai-analyze-btn" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                    <span>🤖</span>
                    <span>AI 智能整理</span>
                </button>
                <div id="ai-loading" class="hidden text-center py-2">
                    <div class="loading-spinner inline-block"></div>
                    <span class="ml-2 text-gray-600">AI 正在分析...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 笔记详情页面 -->
    <div id="note-detail-page" class="fixed inset-0 bg-white z-50 hidden">
        <div class="max-w-lg mx-auto h-full flex flex-col">
            <header class="px-4 py-3 border-b flex items-center justify-between">
                <button onclick="closeDetailPage()" class="text-gray-600 flex items-center gap-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <div class="flex gap-3">
                    <button onclick="editCurrentNote()" class="text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </button>
                    <button onclick="deleteCurrentNote()" class="text-red-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="flex-1 p-4 overflow-y-auto">
                <h1 id="detail-title" class="text-2xl font-bold text-gray-900 mb-3"></h1>
                <div id="detail-meta" class="flex flex-wrap gap-2 mb-4"></div>
                <div id="detail-ai-summary" class="bg-indigo-50 rounded-xl p-4 mb-4 hidden">
                    <h3 class="text-sm font-medium text-indigo-900 mb-2">🤖 AI 摘要</h3>
                    <p id="ai-summary-text" class="text-gray-700 text-sm"></p>
                </div>
                <div id="detail-content" class="text-gray-700 whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <!-- 设置页面 -->
    <div id="settings-page" class="fixed inset-0 bg-gray-50 z-50 hidden">
        <div class="max-w-lg mx-auto h-full">
            <header class="px-4 py-3 bg-white border-b flex items-center gap-3">
                <button onclick="closeSettings()" class="text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <h2 class="text-lg font-semibold">设置</h2>
            </header>

            <div class="p-4 space-y-4">
                <div class="bg-white rounded-xl p-4">
                    <h3 class="font-medium mb-3">🔑 API 配置</h3>
                    <input 
                        type="text" 
                        id="api-key-input"
                        placeholder="输入通义千问 API Key" 
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    >
                    <button onclick="saveApiKey()" class="mt-2 w-full bg-indigo-500 text-white py-2 rounded-lg">保存</button>
                </div>

                <div class="bg-white rounded-xl p-4">
                    <h3 class="font-medium mb-3">📊 数据统计</h3>
                    <p class="text-gray-600">共 <span id="stats-total" class="font-medium text-indigo-600">0</span> 篇笔记</p>
                </div>

                <div class="bg-white rounded-xl p-4">
                    <h3 class="font-medium mb-3">💾 数据管理</h3>
                    <button onclick="exportData()" class="w-full bg-gray-100 text-gray-700 py-2 rounded-lg mb-2">导出数据</button>
                    <button onclick="clearAllData()" class="w-full bg-red-100 text-red-700 py-2 rounded-lg">清空所有数据</button>
                </div>

                <div class="bg-white rounded-xl p-4">
                    <h3 class="font-medium mb-3">📱 安装到主屏幕</h3>
                    <p class="text-gray-600 text-sm mb-2">点击浏览器菜单 → 添加到主屏幕</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t px-4 py-2 z-40">
        <div class="max-w-lg mx-auto flex justify-around">
            <button class="nav-item active flex flex-col items-center py-2 px-4" onclick="showHome()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                <span class="text-xs mt-1">首页</span>
            </button>
            <button class="nav-item flex flex-col items-center py-2 px-4" onclick="openAddPage()">
                <div class="fab-button w-12 h-12 -mt-6 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </div>
            </button>
            <button class="nav-item flex flex-col items-center py-2 px-4" onclick="showStats()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                <span class="text-xs mt-1">统计</span>
            </button>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
